components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        contactPerson: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        mobile: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        taxId: { type: ["string", "null"] }
        source: { type: ["string", "null"] }
        status: { type: ["string", "null"] }
        discountScheme: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        primarySalesRepId: { type: ["integer", "null"] }
        primarySalesRepName: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    CustomerInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        contactPerson: { type: string }
        phone: { type: string }
        mobile: { type: string }
        address: { type: string }
        email: { type: string }
        taxId: { type: string }
        source: { type: string }
        status: { type: string }
        discountScheme: { type: string }
        notes: { type: string }
        primarySalesRepId: { type: integer }

    CustomerUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        contactPerson: { type: string }
        phone: { type: string }
        mobile: { type: string }
        address: { type: string }
        email: { type: string }
        taxId: { type: string }
        source: { type: string }
        status: { type: string }
        discountScheme: { type: string }
        notes: { type: string }
        primarySalesRepId: { type: ["integer", "null"] }

    CustomerAddress:
      type: object
      required: [id, customerId, label, address, isDefault, createdAt]
      properties:
        id: { type: integer }
        customerId: { type: integer }
        label: { type: string }
        address: { type: string }
        isDefault: { type: boolean }
        createdAt: { type: string }

    CustomerAddressInput:
      type: object
      required: [label, address]
      properties:
        label: { type: string, minLength: 1 }
        address: { type: string, minLength: 1 }
        isDefault: { type: boolean }

    CustomerAddressUpdate:
      type: object
      properties:
        label: { type: string }
        address: { type: string }
        isDefault: { type: boolean }

    CustomerDuplicateCheckInput:
      type: object
      properties:
        phone: { type: string }
        mobile: { type: string }
        taxId: { type: string }

    AcUnit:
      type: object
      required: [id, customerId, brand, model, createdAt, updatedAt]
      properties:
        id: { type: integer }
        customerId: { type: integer }
