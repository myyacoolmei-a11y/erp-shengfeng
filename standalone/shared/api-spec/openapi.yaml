openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 晟風工程 ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: 驗證與授權
  - name: users
    description: 使用者管理
  - name: customers
    description: 客戶資料
  - name: acUnits
    description: 冷氣設備
  - name: quotes
    description: 報價單
  - name: workOrders
    description: 派工單
  - name: repairCases
    description: 維修案件
  - name: progress
    description: 工程進度
  - name: payments
    description: 收款紀錄
  - name: warranties
    description: 保固資料
  - name: maintenance
    description: 保養提醒
  - name: receivables
    description: 應收帳款
  - name: dashboard
    description: 儀表板
  - name: employees
    description: 員工管理
  - name: products
    description: 商品管理
  - name: wholesale-customers
    description: 批發客戶
  - name: wholesale-quotes
    description: 批發報價單
  - name: wholesale-orders
    description: 批發訂單
  - name: wholesale-receivables
    description: 批發應收款

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: 登入
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: 登入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: 帳號或密碼錯誤

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: 登出
      responses:
        "200":
          description: 登出成功

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: 取得目前登入使用者
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 目前登入使用者資訊
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: 修改密碼
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: 密碼修改成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 目前密碼錯誤或格式不符

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: 列出所有使用者（老闆專用）
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 使用者清單
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserItem"
    post:
      operationId: createUser
      tags: [users]
      summary: 新增使用者（老闆專用）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: 使用者已建立
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: 更新使用者（老闆專用）
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: 使用者已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: 列出所有客戶
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: 搜尋關鍵字（姓名、電話、地址）
        - name: includeOld
          in: query
          schema:
            type: string
          description: 是否包含兩年前的客戶 (true/false)
      responses:
        "200":
          description: 客戶列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: 新增客戶
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: 取得客戶詳細資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 客戶資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: 找不到客戶
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: 更新客戶資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: 找不到客戶
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: 刪除客戶
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功
        "404":
          description: 找不到客戶

  /customers/check-duplicate:
    post:
      operationId: checkCustomerDuplicate
      tags: [customers]
      summary: 檢查是否有重複客戶（依手機/市話/統編）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerDuplicateCheckInput"
      responses:
        "200":
          description: 符合的客戶列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"

  /customers/{customerId}/addresses:
    get:
      operationId: listCustomerAddresses
      tags: [customers]
      summary: 取得客戶地址列表
      parameters:
        - name: customerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 地址列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerAddress"
    post:
      operationId: createCustomerAddress
      tags: [customers]
      summary: 新增客戶地址
      parameters:
        - name: customerId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerAddressInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAddress"

  /customers/{customerId}/addresses/{addressId}:
    patch:
      operationId: updateCustomerAddress
      tags: [customers]
      summary: 更新客戶地址
      parameters:
        - name: customerId
          in: path
          required: true
          schema: { type: integer }
        - name: addressId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerAddressUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAddress"
    delete:
      operationId: deleteCustomerAddress
      tags: [customers]
      summary: 刪除客戶地址
      parameters:
        - name: customerId
          in: path
          required: true
          schema: { type: integer }
        - name: addressId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: 刪除成功

  /customers/{customerId}/ac-units:
    get:
      operationId: listAcUnits
      tags: [acUnits]
      summary: 取得客戶的冷氣設備列表
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 冷氣設備列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcUnit"
    post:
      operationId: createAcUnit
      tags: [acUnits]
      summary: 新增冷氣設備
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcUnitInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcUnit"

  /ac-units/{id}:
    patch:
      operationId: updateAcUnit
      tags: [acUnits]
      summary: 更新冷氣設備
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcUnitUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcUnit"
    delete:
      operationId: deleteAcUnit
      tags: [acUnits]
      summary: 刪除冷氣設備
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: 列出所有員工
      parameters:
        - name: position
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 員工列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: 新增員工
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/performance:
    get:
      operationId: listEmployeesPerformance
      tags: [employees]
      summary: 列出所有員工當月績效
      parameters:
        - name: month
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          description: 月份 YYYY-MM，預設當月
      responses:
        "200":
          description: 員工績效列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeePerformance"

  /employees/{id}/performance:
    get:
      operationId: getEmployeePerformance
      tags: [employees]
      summary: 取得員工當月績效
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          description: 月份 YYYY-MM，預設當月
      responses:
        "200":
          description: 員工績效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeePerformance"
        "404":
          description: 找不到員工

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: 取得員工詳細資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 員工資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: 找不到員工
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: 更新員工
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: 找不到員工
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: 刪除員工
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: 列出所有報價單
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 報價單列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: 新增報價單
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: 取得報價單詳細資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 報價單資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: 找不到報價單
    patch:
      operationId: updateQuote
      tags: [quotes]
      summary: 更新報價單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: 找不到報價單
    delete:
      operationId: deleteQuote
      tags: [quotes]
      summary: 刪除報價單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /work-orders:
    get:
      operationId: listWorkOrders
      tags: [workOrders]
      summary: 列出所有派工單
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 派工單列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [workOrders]
      summary: 新增派工單
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /work-orders/{id}:
    get:
      operationId: getWorkOrder
      tags: [workOrders]
      summary: 取得派工單詳細資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 派工單資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "404":
          description: 找不到派工單
    patch:
      operationId: updateWorkOrder
      tags: [workOrders]
      summary: 更新派工單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "404":
          description: 找不到派工單
    delete:
      operationId: deleteWorkOrder
      tags: [workOrders]
      summary: 刪除派工單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /work-orders/{workOrderId}/progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: 取得派工單的工程進度
      parameters:
        - name: workOrderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 工程進度列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"
    post:
      operationId: createProgress
      tags: [progress]
      summary: 新增工程進度紀錄
      parameters:
        - name: workOrderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /repair-cases:
    get:
      operationId: listRepairCases
      tags: [repairCases]
      summary: 列出維修案件
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: 搜尋案件編號、客戶、電話、技師、狀態
        - name: status
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 維修案件列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RepairCase"
    post:
      operationId: createRepairCase
      tags: [repairCases]
      summary: 新增維修案件
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairCaseInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairCaseDetail"

  /repair-cases/{id}:
    get:
      operationId: getRepairCase
      tags: [repairCases]
      summary: 取得維修案件詳情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 維修案件詳情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairCaseDetail"
        "404":
          description: 找不到維修案件
    patch:
      operationId: updateRepairCase
      tags: [repairCases]
      summary: 更新維修案件
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairCaseUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairCaseDetail"
    delete:
      operationId: deleteRepairCase
      tags: [repairCases]
      summary: 刪除維修案件
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: 列出所有收款紀錄
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: 收款紀錄列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: 新增收款紀錄
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: 取得收款紀錄
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 收款紀錄
          content:
