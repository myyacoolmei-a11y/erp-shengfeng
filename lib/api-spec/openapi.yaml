openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 晟風工程 ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: 驗證與授權
  - name: users
    description: 使用者管理
  - name: customers
    description: 客戶資料
  - name: acUnits
    description: 冷氣設備
  - name: quotes
    description: 報價單
  - name: workOrders
    description: 派工單
  - name: progress
    description: 工程進度
  - name: payments
    description: 收款紀錄
  - name: warranties
    description: 保固資料
  - name: maintenance
    description: 保養提醒
  - name: dashboard
    description: 儀表板

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: 登入
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: 登入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: 帳號或密碼錯誤

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: 登出
      responses:
        "200":
          description: 登出成功

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: 取得目前登入使用者
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 目前登入使用者資訊
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: 修改密碼
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: 密碼修改成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 目前密碼錯誤或格式不符

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: 列出所有使用者（老闆專用）
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 使用者清單
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserItem"
    post:
      operationId: createUser
      tags: [users]
      summary: 新增使用者（老闆專用）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: 使用者已建立
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: 更新使用者（老闆專用）
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: 使用者已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: 列出所有客戶
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: 搜尋關鍵字（姓名、電話、地址）
        - name: includeOld
          in: query
          schema:
            type: string
          description: 是否包含兩年前的客戶 (true/false)
      responses:
        "200":
          description: 客戶列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: 新增客戶
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: 取得客戶詳細資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 客戶資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: 找不到客戶
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: 更新客戶資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: 找不到客戶
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: 刪除客戶
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功
        "404":
          description: 找不到客戶

  /customers/{customerId}/ac-units:
    get:
      operationId: listAcUnits
      tags: [acUnits]
      summary: 取得客戶的冷氣設備列表
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 冷氣設備列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcUnit"
    post:
      operationId: createAcUnit
      tags: [acUnits]
      summary: 新增冷氣設備
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcUnitInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcUnit"

  /ac-units/{id}:
    patch:
      operationId: updateAcUnit
      tags: [acUnits]
      summary: 更新冷氣設備
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcUnitUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcUnit"
    delete:
      operationId: deleteAcUnit
      tags: [acUnits]
      summary: 刪除冷氣設備
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: 列出所有報價單
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 報價單列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: 新增報價單
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: 取得報價單詳細資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 報價單資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: 找不到報價單
    patch:
      operationId: updateQuote
      tags: [quotes]
      summary: 更新報價單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: 找不到報價單
    delete:
      operationId: deleteQuote
      tags: [quotes]
      summary: 刪除報價單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /work-orders:
    get:
      operationId: listWorkOrders
      tags: [workOrders]
      summary: 列出所有派工單
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 派工單列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [workOrders]
      summary: 新增派工單
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /work-orders/{id}:
    get:
      operationId: getWorkOrder
      tags: [workOrders]
      summary: 取得派工單詳細資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 派工單資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "404":
          description: 找不到派工單
    patch:
      operationId: updateWorkOrder
      tags: [workOrders]
      summary: 更新派工單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "404":
          description: 找不到派工單
    delete:
      operationId: deleteWorkOrder
      tags: [workOrders]
      summary: 刪除派工單
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /work-orders/{workOrderId}/progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: 取得派工單的工程進度
      parameters:
        - name: workOrderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 工程進度列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"
    post:
      operationId: createProgress
      tags: [progress]
      summary: 新增工程進度紀錄
      parameters:
        - name: workOrderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: 列出所有收款紀錄
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: 收款紀錄列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: 新增收款紀錄
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: 取得收款紀錄
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 收款紀錄
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: 找不到收款紀錄
    patch:
      operationId: updatePayment
      tags: [payments]
      summary: 更新收款紀錄
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: 刪除收款紀錄
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /warranties:
    get:
      operationId: listWarranties
      tags: [warranties]
      summary: 列出所有保固資料
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: 保固列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warranty"
    post:
      operationId: createWarranty
      tags: [warranties]
      summary: 新增保固資料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warranty"

  /warranties/{id}:
    get:
      operationId: getWarranty
      tags: [warranties]
      summary: 取得保固資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 保固資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warranty"
        "404":
          description: 找不到保固資料
    patch:
      operationId: updateWarranty
      tags: [warranties]
      summary: 更新保固資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warranty"
    delete:
      operationId: deleteWarranty
      tags: [warranties]
      summary: 刪除保固資料
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /maintenance-reminders:
    get:
      operationId: listMaintenanceReminders
      tags: [maintenance]
      summary: 列出保養提醒
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: upcoming
          in: query
          schema:
            type: string
          description: 是否只顯示即將到期的提醒 (true/false)
      responses:
        "200":
          description: 保養提醒列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceReminder"
    post:
      operationId: createMaintenanceReminder
      tags: [maintenance]
      summary: 新增保養提醒
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceReminderInput"
      responses:
        "201":
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceReminder"

  /maintenance-reminders/{id}:
    get:
      operationId: getMaintenanceReminder
      tags: [maintenance]
      summary: 取得保養提醒
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 保養提醒
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceReminder"
        "404":
          description: 找不到保養提醒
    patch:
      operationId: updateMaintenanceReminder
      tags: [maintenance]
      summary: 更新保養提醒
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceReminderUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceReminder"
    delete:
      operationId: deleteMaintenanceReminder
      tags: [maintenance]
      summary: 刪除保養提醒
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 刪除成功

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: 取得儀表板統計摘要
      responses:
        "200":
          description: 統計摘要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      required: [id, name, phone, address, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        address: { type: string }
        email: { type: ["string", "null"] }
        discountScheme: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    CustomerInput:
      type: object
      required: [name, phone, address]
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string, minLength: 1 }
        address: { type: string, minLength: 1 }
        email: { type: string }
        discountScheme: { type: string }
        notes: { type: string }

    CustomerUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string }
        address: { type: string }
        email: { type: string }
        discountScheme: { type: string }
        notes: { type: string }

    AcUnit:
      type: object
      required: [id, customerId, brand, model, createdAt, updatedAt]
      properties:
        id: { type: integer }
        customerId: { type: integer }
        brand: { type: string }
        model: { type: string }
        serialNumber: { type: ["string", "null"] }
        purchaseDate: { type: ["string", "null"] }
        installationDate: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    AcUnitInput:
      type: object
      required: [brand, model]
      properties:
        brand: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        serialNumber: { type: string }
        purchaseDate: { type: string }
        installationDate: { type: string }
        notes: { type: string }

    AcUnitUpdate:
      type: object
      properties:
        brand: { type: string }
        model: { type: string }
        serialNumber: { type: string }
        purchaseDate: { type: string }
        installationDate: { type: string }
        notes: { type: string }

    Quote:
      type: object
      required: [id, customerId, title, amount, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        customerId: { type: integer }
        customerName: { type: ["string", "null"] }
        title: { type: string }
        description: { type: ["string", "null"] }
        amount: { type: number }
        discountAmount: { type: ["number", "null"] }
        finalAmount: { type: ["number", "null"] }
        status: { type: string }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    QuoteInput:
      type: object
      required: [customerId, title, amount, status]
      properties:
        customerId: { type: integer }
        title: { type: string, minLength: 1 }
        description: { type: string }
        amount: { type: number }
